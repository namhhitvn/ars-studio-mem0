  #       from_secret: ARS_CORE_MAC_USER
  #     key:
  #       from_secret: ARS_CORE_MAC_SSH_KEY_PLAINTEXT
  #     envs:
  #       - WORKDIR
  #     script:
  #       - $WORKDIR/infra/core-mac/drone-deploy.sh

trigger:
  event:
    - push
  branch:
    - main
